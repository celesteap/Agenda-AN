name: Update Agenda

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests ics

      - name: Run script
        run: python update_agenda.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Cette ligne crée le fichier s'il n'existe pas pour éviter l'erreur 128
          touch agenda.ics 
          git add agenda.ics
          # Le "|| exit 0" permet d'ignorer l'erreur s'il n'y a pas de changements
          git commit -m "Mise à jour automatique de l'agenda" || exit 0
          git push
